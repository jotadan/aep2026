<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTech - Criar conta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dark-mode.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="/static/imagens/logo.png" alt="Logo EcoTech">
            </div>
            <h1 class="auth-title">Criar conta</h1>
            <p class="auth-subtitle">Junte-se ao EcoTech e ajude sua cidade</p>

            {% with mensagens = get_flashed_messages(with_categories=true) %}
                {% for categoria, mensagem in mensagens %}
                    <div class="auth-alert"><i class="bi bi-exclamation-circle"></i>{{ mensagem }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST" action="/registro">
                <div class="auth-field">
                    <label class="auth-label" for="nome">Nome completo</label>
                    <div class="auth-input-wrapper">
                        <i class="bi bi-person"></i>
                        <input class="auth-input" type="text" id="nome" name="nome" placeholder="Seu nome" required>
                    </div>
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="email">E-mail</label>
                    <div class="auth-input-wrapper">
                        <i class="bi bi-envelope"></i>
                        <input class="auth-input" type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="senha">Senha</label>
                    <div class="auth-input-wrapper">
                        <i class="bi bi-lock"></i>
                        <input class="auth-input" type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                </div>
                <button class="auth-btn" type="submit">Criar conta</button>
            </form>

            <div class="auth-footer">
                Já tem conta? <a href="/login">Entrar</a>
            </div>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
